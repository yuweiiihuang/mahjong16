<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>Mahjong16 Web Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app">
      <main id="table">
        <div id="table-surface">
          <div class="table-rail rail-top"></div>
          <div class="table-rail rail-bottom"></div>
          <div class="table-rail rail-left"></div>
          <div class="table-rail rail-right"></div>
          <div id="table-hud">
            <div class="hud-top">
              <div class="status-pill rate-pill">
                <span class="pill-label">Rate</span>
                <span class="pill-value" id="status-rate">—</span>
              </div>
              <div class="hud-round">
                <div class="round-label" id="status-round">—</div>
                <div class="round-countdown">
                  <span class="round-wind" id="status-turn-wind">—</span>
                  <span class="round-timer" id="status-countdown">--</span>
                </div>
                <div class="round-phase" id="status-phase">等待更新…</div>
              </div>
              <div class="status-pill wall-pill">
                <span class="pill-label">剩餘牌山</span>
                <span class="pill-value" id="status-remaining">—</span>
                <span class="pill-sub" id="status-dead-wall">王牌 —</span>
              </div>
            </div>
            <div class="hud-left">
              <div class="wind-track">
                <div class="wind-slot" data-wind-slot="south">
                  <span class="wind-letter">東</span>
                  <span class="wind-ascii">E</span>
                </div>
                <div class="wind-slot" data-wind-slot="west">
                  <span class="wind-letter">南</span>
                  <span class="wind-ascii">S</span>
                </div>
                <div class="wind-slot" data-wind-slot="north">
                  <span class="wind-letter">西</span>
                  <span class="wind-ascii">W</span>
                </div>
                <div class="wind-slot" data-wind-slot="east">
                  <span class="wind-letter">北</span>
                  <span class="wind-ascii">N</span>
                </div>
              </div>
            </div>
          </div>
          <div id="center-stage">
            <div id="center-table">
              <div id="center-seat-north" class="center-seat center-north">—</div>
              <div id="center-seat-east" class="center-seat center-east">—</div>
              <div id="center-seat-south" class="center-seat center-south">—</div>
              <div id="center-seat-west" class="center-seat center-west">—</div>
            </div>
            <div id="center-last">
              <span id="last-action"></span>
            </div>
          </div>
          <section id="slot-north" class="player-slot seat-north"></section>
          <section id="slot-east" class="player-slot seat-east"></section>
          <section id="slot-south" class="player-slot seat-south"></section>
          <section id="slot-west" class="player-slot seat-west"></section>
        </div>
      </main>
      <section id="actions" class="panel">
        <h2>可操作行動</h2>
        <div id="action-meta"></div>
        <div id="action-buttons" class="button-grid"></div>
      </section>
      <section id="summaries" class="panel">
        <h2>牌譜摘要</h2>
        <div id="summary-list"></div>
      </section>
    </div>
    <div id="reveal-overlay" hidden>
      <div class="modal">
        <button id="close-reveal" aria-label="Close">×</button>
        <h2>手牌揭示</h2>
        <div id="reveal-content"></div>
      </div>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
