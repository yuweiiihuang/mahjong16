<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>Mahjong16 Web Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app">
      <main id="table">
        <div id="table-surface">
          <div id="center-stage">
            <div id="center-table">
              <div id="center-seat-north" class="center-seat center-north">—</div>
              <div id="center-seat-east" class="center-seat center-east">—</div>
              <div id="center-seat-south" class="center-seat center-south">—</div>
              <div id="center-seat-west" class="center-seat center-west">—</div>
            </div>
            <div id="center-last">
              <span id="last-action"></span>
            </div>
          </div>
          <section id="slot-north" class="player-slot seat-north"></section>
          <section id="slot-east" class="player-slot seat-east"></section>
          <section id="slot-south" class="player-slot seat-south"></section>
          <section id="slot-west" class="player-slot seat-west"></section>
        </div>
      </main>
      <section id="actions" class="panel">
        <h2>可操作行動</h2>
        <div id="action-meta"></div>
        <div id="action-buttons" class="button-grid"></div>
      </section>
      <section id="summaries" class="panel">
        <h2>牌譜摘要</h2>
        <div id="summary-list"></div>
      </section>
    </div>
    <div id="reveal-overlay" hidden>
      <div class="modal">
        <button id="close-reveal" aria-label="Close">×</button>
        <h2>手牌揭示</h2>
        <div id="reveal-content"></div>
      </div>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
